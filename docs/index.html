<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Smart LED Display</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1e293b;
    padding:35px;
    border-radius:12px;
    width:380px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
    margin-bottom:10px;
}

p{
    color:#94a3b8;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

.counter{
    text-align:right;
    font-size:12px;
    color:#94a3b8;
    margin-top:5px;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:6px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#2563eb;
}

.preview{
    margin-top:20px;
    background:black;
    padding:10px;
    border-radius:6px;
    font-family:monospace;
    font-size:18px;
    letter-spacing:2px;
}

.status{
    margin-top:10px;
    color:#22c55e;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart LED Display</h1>
<p>Send a message to the LED board</p>

<input
type="text"
id="messageInput"
maxlength="50"
placeholder="Enter your message">

<div class="counter">
<span id="count">0</span>/50
</div>

<button id="sendButton">
Send Message
</button>

<div class="preview" id="preview">
LED PREVIEW
</div>

<div class="status" id="status"></div>

</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBbSaVTRkOlwEcK6EdewcTpAeDVCCG0Rg0",
authDomain: "smart-led-display.firebaseapp.com",
databaseURL: "https://smart-led-display-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-led-display",
storageBucket: "smart-led-display.firebasestorage.app",
messagingSenderId: "385138898456",
appId: "1:385138898456:web:f05abaee27cc1b635db56d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();


const input = document.getElementById("messageInput");
const counter = document.getElementById("count");
const preview = document.getElementById("preview");
const status = document.getElementById("status");

input.addEventListener("input", function(){

counter.innerText = input.value.length;

preview.innerText = input.value || "LED PREVIEW";

});


document.getElementById("sendButton").onclick = function(){

const message = input.value.trim();

if(message === ""){
status.innerText = "Message cannot be empty";
return;
}

db.ref("led/message").set(message);

status.innerText = "Message sent to LED display!";

input.value = "";
counter.innerText = "0";
preview.innerText = "LED PREVIEW";

}

</script>

</body>
</html>
