<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart LED Display</title>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
padding:20px;
}

.container{
background:#1e293b;
padding:25px;
border-radius:12px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h1{
margin-bottom:5px;
font-size:24px;
}

p{
color:#94a3b8;
margin-bottom:15px;
font-size:14px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.counter{
text-align:right;
font-size:12px;
color:#94a3b8;
margin-top:4px;
}

button{
margin-top:12px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
font-size:16px;
}

button:active{
background:#2563eb;
}

.quick{
margin-top:20px;
}

.quick button{
background:#10b981;
}

.quick button:active{
background:#059669;
}

.preview{
margin-top:18px;
background:black;
padding:12px;
border-radius:6px;
font-family:monospace;
font-size:18px;
letter-spacing:2px;
min-height:40px;
display:flex;
align-items:center;
justify-content:center;
}

.status{
margin-top:10px;
color:#22c55e;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>Smart LED Display</h1>
<p>Send a message to the LED board</p>

<input
type="text"
id="messageInput"
maxlength="50"
placeholder="Enter your message">

<div class="counter">
<span id="count">0</span>/50
</div>

<button id="sendButton">
Send Message
</button>

<div class="quick">

<button onclick="showTime()">
Show Current Time
</button>

<button onclick="showWeather()">
Show Weather
</button>

<button onclick="clearScreen()">
Clear Screen
</button>

</div>

<div class="preview" id="preview">
LED PREVIEW
</div>

<div class="status" id="status"></div>

</div>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBbSaVTRkOlwEcK6EdewcTpAeDVCCG0Rg0",
authDomain: "smart-led-display.firebaseapp.com",
databaseURL: "https://smart-led-display-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "smart-led-display",
storageBucket: "smart-led-display.firebasestorage.app",
messagingSenderId: "385138898456",
appId: "1:385138898456:web:f05abaee27cc1b635db56d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const input = document.getElementById("messageInput");
const counter = document.getElementById("count");
const preview = document.getElementById("preview");
const status = document.getElementById("status");


input.addEventListener("input", function(){
counter.innerText = input.value.length;
preview.innerText = input.value || "LED PREVIEW";
});


document.getElementById("sendButton").onclick = function(){

const message = input.value.trim();

if(message === ""){
status.innerText = "Message cannot be empty";
return;
}

db.ref("led").set({
type:"text",
value:message
});

status.innerText = "Message sent!";

input.value="";
counter.innerText="0";
preview.innerText="LED PREVIEW";

}


function showTime(){

db.ref("led").set({
type:"time"
});

status.innerText="Displaying Time";

}


function showWeather(){

db.ref("led").set({
type:"weather"
});

status.innerText="Displaying Weather";

}


function clearScreen(){

db.ref("led").set({
type:"clear"
});

status.innerText="Screen Cleared";

}

</script>

</body>

</html>
